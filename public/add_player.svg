<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="strokeGrad" x1="20" y1="20" x2="236" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E9ECFF"/>
      <stop offset="45%" stop-color="#AEB6FF"/>
      <stop offset="100%" stop-color="#7D86FF"/>
    </linearGradient>

    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.32
                0 0 0 0 0.36
                0 0 0 0 1.00
                0 0 0 0.80 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="plusGrad" x1="128" y1="64" x2="128" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D9DEFF"/>
    </linearGradient>
  </defs>

  <!-- Transparent background: no outer rect -->
  <g filter="url(#glow)">
    <!-- rounded square outline only -->
    <rect x="28" y="28" width="200" height="200" rx="40"
          fill="none" stroke="url(#strokeGrad)" stroke-width="10"/>
  </g>

  <!-- plus icon -->
  <rect x="112" y="68" width="32" height="120" rx="14" fill="url(#plusGrad)"/>
  <rect x="68" y="112" width="120" height="32" rx="14" fill="url(#plusGrad)"/>
</svg>
